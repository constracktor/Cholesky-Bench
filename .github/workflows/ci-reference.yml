name: "CI: Reference"

on:
  push:

jobs:
  build-validate:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: spack/setup-spack@v3
        with:
          spack_ref: releases/v1.1
          packages_ref: v2025.11.0
          buildcache: true

      - name: Install dependencies
        run: |
          spack compiler find
          spack install --no-check-signature plasma ^openblas@0.3.28 threads=openmp

      - name: Configure, build and validate
        working-directory: reference
        run: |
          eval $(spack load --sh plasma ^openblas@0.3.28 threads=openmp)
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_VALIDATION=ON \
            -DENABLE_PLASMA=ON
          cmake --build build -j$(nproc)
          OMP_NUM_THREADS=2 ./build/cholesky_reference \
            --size_start 64 --size_stop 128 --loop 1 \
            2>stderr.txt | tee stdout.txt
          cat stderr.txt
          if grep -q "Validation warning" stderr.txt; then
            echo "FAILED: residual exceeds tolerance"
            exit 1
          fi
          if ! grep -q "\[validate\]" stdout.txt; then
            echo "FAILED: no validation output found (ENABLE_VALIDATION may not have taken effect)"
            exit 1
          fi
          echo "All residuals within tolerance."
